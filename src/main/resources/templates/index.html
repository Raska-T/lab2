<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Архив миссий</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        a {
            text-decoration: none;
            color: #0066cc;
        }
        a:hover {
            text-decoration: underline;
        }
        button {
            background: #c0392b;
            color: white;
            border: none;
            padding: 5px 15px;
            cursor: pointer;
        }
        button:hover {
            background: #e74c3c;
        }
        .msg {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

<h1>Архив миссий</h1>

<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Загрузить</button>
</form>

<hr/>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Location</th>
        <th>Curse</th>
        <th>Outcome</th>
        <th>Sorcerers</th>
        <th>Report</th>
        <th>Edit</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${missions}">
        <td th:text="${m.missionId}"></td>
        <td th:text="${m.location}"></td>
        <td th:text="${m.curse != null ? m.curse.name : '-'}"></td>
        <td th:text="${m.outcome}"></td>
        <td>
                <span th:each="s, iterStat : ${m.sorcerers}">
                    <span th:text="${s.name}"></span><span th:if="${!iterStat.last}">, </span>
                </span>
            <span th:if="${#lists.isEmpty(m.sorcerers)}">-</span>
        </td>
        <td><a th:href="@{'/report/' + ${m.missionId}}">Report</a></td>
        <td><a th:href="@{'/edit/' + ${m.missionId}}">Edit</a></td>
    </tr>
    </tbody>
</table>

<p th:if="${msg}" class="msg" th:text="${msg}"></p>
<p th:if="${error}" class="error" th:text="${error}"></p>

</body>
</html>
